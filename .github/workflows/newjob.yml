name: Playwright - E2E Testing with one job

# This workflow runs Playwright tests on push, pull request, and on a schedule.
# uses data serialization language like yaml
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'
    # '* * * * *' means 1st star is minute, 2nd is hour, 3rd is day of month, 4th is month, 5th is day of week
    # so '0 2 * * *' means at 2:00 AM every day
  workflow_dispatch:
    inputs:
      tags:
        description: 'Comma-separated list of tags to filter Playwright tests'
        required: false
        default: ''
        type: string
      browser:
        description: 'Browser to run Playwright tests on'
        required: true
        default: 'chromium'
        type: choice
        # type has options: choice, boolean, environment, string
        # choice means user can select from predefined options in the UI when manually triggering the workflow
        # boolean would show a checkbox in the UI
        # environment would read from environment variables
        #example of environment input:
        # env: BROWSER
        # would read the value of BROWSER environment variable when workflow is triggered
        
        # string would allow free text input
        options: [chromium, firefox, webkit]
      workers:
        description: 'number of parallel workers'
        default: '4'
        type: choice
        options: ['1','2','4','8']
      reporter:
        description: 'Playwright reporter'
        default: 'html'
        type: choice
        options: [html, list, json]

jobs:
  run-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: |
          npx playwright test \
          --grep "${{ github.event.inputs.tags }}" \
          --project=${{ github.event.inputs.browser || 'chromium' }} \
          --reporter=${{ github.event.inputs.reporter || 'html' }} \
          --workers=${{ github.event.inputs.workers || '4' }}
        continue-on-error: true

      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7