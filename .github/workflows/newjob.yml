name: Playwright - E2E Testing

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to run Playwright tests on'
        default: 'chromium'
        type: choice
        options: [chromium, firefox, webkit]
      workers:
        description: 'number of parallel workers'
        default: '4'
        type: choice
        options: ['1','2','4','8']
      reporter:
        description: 'Playwright reporter'
        default: 'html'
        type: choice
        options: [html, list, json]

jobs:
  run-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: |
          npx playwright test \
          --reporter=${{ github.event.inputs.reporter || 'html' }} \
          --workers=${{ github.event.inputs.workers || '4' }}
        continue-on-error: true

      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7