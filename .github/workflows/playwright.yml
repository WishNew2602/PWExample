name: Playwright Tests

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  schedule:
    - cron: "0 4 * * *"  # Runs daily at 4 AM UTC

jobs:
  test: 
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      # Action 1: Checkout code from repository
      - name: Checkout code
        uses: actions/checkout@v3
      
      # Action 2: Setup Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'  # Cache node_modules for faster builds
      
      # Step 3: Install project dependencies
      - name: Install dependencies
        run: npm install
      
      # Step 4: Install Playwright browsers
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      
      # Step 5: Run Playwright tests
      - name: Run Playwright tests
        run: npx playwright test --reporter=html
      
      # Step 6: Upload test report (runs even if tests fail)
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v3
        if: always()  # Always run this step
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
      
      # Step 7: Upload test results JSON
      - name: Upload Test Results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 30
    