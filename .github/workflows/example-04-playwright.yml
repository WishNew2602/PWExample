name: Playwright - E2E Testing

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:
    inputs:
      workers:
        description: 'number of parallel workers for playwright tests'
        required: false
        default: '4'
        type: choice
        options:
          - '1'
          - '2'
          - '4'
          - '8'  
      reporter:
        description: 'Playwright reporter'
        required: false
        default: 'html'
        type: choice
        options:
          - html
          - list
          - json

jobs:
  # Job 1: Setup and download dependencies
  setup-dependencies:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install npm dependencies
        run: npm install
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      
      - name: Upload dependencies artifact
        uses: actions/upload-artifact@v4
        with:
          name: dependencies-artifact
          path: |
            node_modules/
            .playwright/
          retention-days: 1

  # Job 2: Run Playwright tests (depends on setup-dependencies)
  run-tests:
    needs: setup-dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Download dependencies
        uses: actions/download-artifact@v4
        with:
          name: dependencies-artifact
      
      - name: Run Playwright tests
        run: npx playwright test --reporter=${{ github.event.inputs.reporter || 'html' }} --workers=${{ github.event.inputs.workers || '4' }}
        continue-on-error: true  # Continue even if tests fail
      
      # Upload HTML report
      - name: Upload Playwright Report
        if: always()
        uses: ./.github/actions/report-artifact
        with:
          report-path: playwright-report/
          report-name: playwright-html-report
          retention-days: 30
          comment-on-pr: 'true'
      
      # Upload test results
      - name: Upload Test Results
        if: always()
        uses: ./.github/actions/report-artifact
        with:
          report-path: test-results/
          report-name: playwright-test-results
          retention-days: 7
      
      # Comment on PR with summary
      - name: Comment test summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🎭 **Playwright Tests Summary**\n\n✅ All tests have completed!\n\nView full report in Artifacts → playwright-html-report'
            })
