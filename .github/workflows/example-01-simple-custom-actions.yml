name: Simple - Using Custom Actions

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      # Use our custom action: setup-and-test
      - name: Setup and run tests
        uses: ./.github/actions/setup-and-test
        with:
          node-version: '18'
          test-command: npm test
          install-command: npm install
          cache-enabled: 'true'
      
      # Use our custom action: report-artifact
      - name: Upload test report
        if: always()  # Always upload, even if tests fail
        uses: ./.github/actions/report-artifact
        with:
          report-path: test-results/
          report-name: test-report
          retention-days: 30
          if-no-files-found: warn
          comment-on-pr: 'false'
